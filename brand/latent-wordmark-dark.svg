<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" role="img" aria-label="Latent">
  <defs>
    <linearGradient id="latent-arc" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#0c2560"/>
      <stop offset="45%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="latent-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="latent-tail"
        gradientUnits="userSpaceOnUse"
        x1="35.7" y1="10.8" x2="32.1" y2="17.4">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="55%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="1"/>
    </linearGradient>
    <filter id="latent-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="latent-arc-halo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <g transform="translate(6, 6)">
    <circle cx="16" cy="16" r="11" fill="none"
            stroke="url(#latent-arc)" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="43 26"
            transform="rotate(45 16 16)"
            filter="url(#latent-arc-halo)" opacity="0.45"/>
    <circle cx="16" cy="16" r="11" fill="none"
            stroke="url(#latent-arc)" stroke-width="2.4"
            stroke-linecap="round" stroke-dasharray="43 26"
            transform="rotate(45 16 16)"/>
    <path d="M 29.5 4.5 Q 30 7 26 11.2"
          stroke="url(#latent-tail)" stroke-width="1.1"
          stroke-linecap="round"/>
    <circle cx="25.8" cy="11.8" r="3.8" fill="url(#latent-spark)" filter="url(#latent-glow)"/>
    <circle cx="25.8" cy="11.8" r="1.3" fill="#fff7ed"/>
    <!-- Specular highlight -->
    <circle cx="25.4" cy="11.4" r="0.5" fill="#ffffff"/>
  </g>
  <text x="48" y="30"
        font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="800" letter-spacing="-1" fill="#f2f2f8">Latent</text>
</svg>
